<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Beleza Store - Produtos de Beleza SP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #fdf2f8;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.08) 0%, transparent 40%);
            padding: 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #db5a8c, #b83b6d);
            border-radius: 50px 50px 30px 30px;
            margin-bottom: 35px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
            color: white;
        }
        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #6b2040;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-top: 8px;
        }
        .whatsapp-badge {
            background: #25d366;
            display: inline-block;
            padding: 8px 22px;
            border-radius: 40px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* CATEGORIAS */
        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }
        .cat-btn {
            background: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            color: #b83b6d;
            border: 1px solid #ffb7d2;
        }
        .cat-btn.active {
            background: #db5a8c;
            color: white;
            border-color: #db5a8c;
            transform: scale(1.02);
        }

        /* GRADE DE PRODUTOS */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* CARTÃO DO PRODUTO */
        .product-card {
            background: white;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.25s ease, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1px solid #ffe0f0;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.15);
        }
        .product-img {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 12px;
        }
        .product-cat {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            color: white;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .product-info {
            padding: 20px;
            flex: 1;
        }
        .product-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #4a202e;
            margin-bottom: 8px;
        }
        .product-desc {
            font-size: 0.85rem;
            color: #7a5a6a;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .price-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border-top: 1px dashed #ffcce0;
            padding-top: 15px;
        }
        .product-price {
            font-size: 1.7rem;
            font-weight: 800;
            color: #db5a8c;
        }
        .btn-order {
            background: #25d366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-order:hover {
            background: #128c7e;
            transform: scale(1.02);
        }

        /* MODAL DE QUANTIDADE */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 30px black;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #db5a8c;
        }
        .modal-content p {
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .qty-btn {
            background: #f0f0f0;
            border: none;
            font-size: 2rem;
            width: 50px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }
        .qty-btn:active {
            background: #ddd;
        }
        #quantidade {
            font-size: 2rem;
            font-weight: bold;
            min-width: 50px;
        }
        
        /* Formulário de dados do cliente */
        .cliente-form {
            margin: 20px 0;
            text-align: left;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4a202e;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe0f0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #db5a8c;
        }
        .form-group input {
            background: #fffef7;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .confirm-btn {
            background: #25d366;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        .cancel-btn {
            background: #aaa;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #a06b82;
        }
        @media (max-width: 700px) {
            .header h1 { font-size: 1.8rem; }
            .product-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>💄 Beleza Store</h1>
    <p>📍 São Paulo - Jardins | Entrega rápida</p>
    <div class="whatsapp-badge">
        📱 Peça pelo WhatsApp: (31) 98498-7116
    </div>
</div>

<div class="categories">
    <button class="cat-btn active" data-cat="all">✨ Todos</button>
    <button class="cat-btn" data-cat="makeup">💄 Maquiagem</button>
    <button class="cat-btn" data-cat="skincare">🧴 Skincare</button>
    <button class="cat-btn" data-cat="perfumes">🌸 Perfumes</button>
    <button class="cat-btn" data-cat="cabelos">💇‍♀️ Cabelos</button>
</div>

<div class="menu-grid" id="menuGrid"></div>

<footer>
    💖 Clique no produto → escolha a quantidade → preencha seus dados → envie o pedido!
</footer>

<!-- MODAL COM QUANTIDADE + FORMULÁRIO -->
<div id="modalQty" class="modal">
    <div class="modal-content">
        <h3 id="modalProdutoNome">Produto</h3>
        <p id="modalPreco">R$ 0,00</p>
        <p>Quantidade:</p>
        <div class="qty-control">
            <button class="qty-btn" id="menosQty">-</button>
            <span id="quantidade">1</span>
            <button class="qty-btn" id="maisQty">+</button>
        </div>
        
        <!-- Formulário com telefone, endereço e forma de pagamento -->
        <div class="cliente-form">
            <div class="form-group">
                <label>📞 Seu telefone (WhatsApp): *</label>
                <input type="tel" id="clienteTelefone" placeholder="(31) 99999-9999" required>
            </div>
            <div class="form-group">
                <label>🏠 Endereço completo: *</label>
                <input type="text" id="clienteEndereco" placeholder="Rua, número, bairro, complemento" required>
            </div>
            <div class="form-group">
                <label>💰 Forma de pagamento: *</label>
                <select id="formaPagamento">
                    <option value="">Selecione...</option>
                    <option value="Dinheiro">💵 Dinheiro (com troco)</option>
                    <option value="Pix">📱 Pix</option>
                    <option value="Cartão de Crédito">💳 Cartão de Crédito</option>
                    <option value="Cartão de Débito">💳 Cartão de Débito</option>
                    <option value="PicPay">⚡ PicPay</option>
                </select>
            </div>
        </div>
        
        <div class="modal-buttons">
            <button class="confirm-btn" id="confirmarPedido">✅ Enviar Pedido</button>
            <button class="cancel-btn" id="cancelarModal">❌ Cancelar</button>
        </div>
    </div>
</div>

<script>
    // NÚMERO DO WHATSAPP DA LOJA
    const NUMERO_WHATSAPP = "5531984987116";  // 55 + 31 + 984987116

    // BASE DE PRODUTOS DE BELEZA
    const produtos = [
        // Maquiagem
        { id: 1, nome: "Base Líquida Matte", descricao: "Alta cobertura, acabamento mate, 12h de duração", preco: 59.90, categoria: "makeup", img: "💄" },
        { id: 2, nome: "Paleta de Sombras 12 Cores", descricao: "Cores neutras e metalizadas, pigmentação intensa", preco: 79.90, categoria: "makeup", img: "🎨" },
        { id: 3, nome: "Batom Matte Líquido", descricao: "Longa duração, não transfere, 7ml", preco: 39.90, categoria: "makeup", img: "💋" },
        { id: 4, nome: "Máscara de Cílios", descricao: "Alongamento e volume extremos, à prova d'água", preco: 49.90, categoria: "makeup", img: "👁️" },
        { id: 5, nome: "Pó Compacto Translúcido", descricao: "Selagem perfeita, controle de brilho", preco: 54.90, categoria: "makeup", img: "✨" },
        
        // Skincare
        { id: 6, nome: "Hidratante Facial", descricao: "Ácido hialurônico, vitamina C, 50g", preco: 89.90, categoria: "skincare", img: "💧" },
        { id: 7, nome: "Protetor Solar FPS 50", descricao: "Toque seco, oil-free, proteção UVA/UVB", preco: 69.90, categoria: "skincare", img: "☀️" },
        { id: 8, nome: "Sérum Anti-Idade", descricao: "Retinol + ácido glicólico, 30ml", preco: 129.90, categoria: "skincare", img: "🌟" },
        { id: 9, nome: "Água Micelar", descricao: "Limpeza suave, remove maquiagem, 500ml", preco: 44.90, categoria: "skincare", img: "🧴" },
        { id: 10, nome: "Máscara de Argila", descricao: "Limpeza profunda, controle de oleosidade", preco: 34.90, categoria: "skincare", img: "🧖‍♀️" },
        
        // Perfumes
        { id: 11, nome: "Perfume Floratta", descricao: "Feminino, notas florais e frutais, 50ml", preco: 159.90, categoria: "perfumes", img: "🌸" },
        { id: 12, nome: "Perfume Malbec", descricao: "Masculino, notas amadeiradas e especiarias", preco: 179.90, categoria: "perfumes", img: "🍷" },
        { id: 13, nome: "Body Splash", descricao: "Fragrância suave, 200ml, uso diário", preco: 49.90, categoria: "perfumes", img: "💕" },
        { id: 14, nome: "Perfume Importado", descricao: "Luxo, francês, 30ml (réplica premium)", preco: 199.90, categoria: "perfumes", img: "✨" },
        
        // Cabelos
        { id: 15, nome: "Shampoo Reconstrutor", descricao: "Queratina líquida, 300ml, cabelos danificados", preco: 49.90, categoria: "cabelos", img: "🧴" },
        { id: 16, nome: "Máscara de Hidratação", descricao: "Manteiga de Karité, 500g, hidratação profunda", preco: 59.90, categoria: "cabelos", img: "💇‍♀️" },
        { id: 17, nome: "Óleo Finalizador", descricao: "Brilho intenso, sem enxágue, 100ml", preco: 39.90, categoria: "cabelos", img: "✨" },
        { id: 18, nome: "Chapinha Ultra Hair", descricao: "Temperatura regulável, cerâmica, 110v/220v", preco: 149.90, categoria: "cabelos", img: "🔌" },
        { id: 19, nome: "Secador Profissional", descricao: "1900W, íons negativos, 3 temperaturas", preco: 199.90, categoria: "cabelos", img: "💨" },
        { id: 20, nome: "Kit Tratamento Capilar", descricao: "Shampoo + Condicionador + Máscara", preco: 109.90, categoria: "cabelos", img: "🎁" }
    ];

    let produtosAtivos = [...produtos];
    let produtoSelecionado = null;
    let quantidadeAtual = 1;

    // Elementos
    const menuGrid = document.getElementById("menuGrid");
    const modal = document.getElementById("modalQty");
    const modalProdutoNome = document.getElementById("modalProdutoNome");
    const modalPrecoSpan = document.getElementById("modalPreco");
    const quantidadeSpan = document.getElementById("quantidade");
    const menosBtn = document.getElementById("menosQty");
    const maisBtn = document.getElementById("maisQty");
    const confirmarBtn = document.getElementById("confirmarPedido");
    const cancelarBtn = document.getElementById("cancelarModal");
    
    // Campos do formulário
    const clienteTelefone = document.getElementById("clienteTelefone");
    const clienteEndereco = document.getElementById("clienteEndereco");
    const formaPagamento = document.getElementById("formaPagamento");

    // Renderizar produtos no grid
    function renderizarProdutos() {
        menuGrid.innerHTML = "";
        produtosAtivos.forEach(produto => {
            const card = document.createElement("div");
            card.classList.add("product-card");
            card.addEventListener("click", (e) => {
                if(e.target.classList.contains("btn-order") || e.target.closest(".btn-order")) {
                    return;
                }
                abrirModal(produto);
            });
            
            const imgDiv = document.createElement("div");
            imgDiv.className = "product-img";
            imgDiv.style.backgroundColor = "#fceaeff";
            imgDiv.style.display = "flex";
            imgDiv.style.alignItems = "center";
            imgDiv.style.justifyContent = "center";
            imgDiv.style.fontSize = "4rem";
            imgDiv.innerHTML = `<span style="filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));">${produto.img || "💄"}</span>`;
            
            const catSpan = document.createElement("span");
            catSpan.className = "product-cat";
            let catTexto = "";
            if(produto.categoria === "makeup") catTexto = "💄 Maquiagem";
            else if(produto.categoria === "skincare") catTexto = "🧴 Skincare";
            else if(produto.categoria === "perfumes") catTexto = "🌸 Perfumes";
            else catTexto = "💇‍♀️ Cabelos";
            catSpan.innerText = catTexto;
            imgDiv.appendChild(catSpan);
            
            const infoDiv = document.createElement("div");
            infoDiv.className = "product-info";
            infoDiv.innerHTML = `
                <div class="product-name">${produto.nome}</div>
                <div class="product-desc">${produto.descricao}</div>
                <div class="price-area">
                    <span class="product-price">R$ ${produto.preco.toFixed(2)}</span>
                    <button class="btn-order" data-id="${produto.id}">📲 Pedir</button>
                </div>
            `;
            card.appendChild(imgDiv);
            card.appendChild(infoDiv);
            menuGrid.appendChild(card);
        });
        
        document.querySelectorAll(".btn-order").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const produtoId = parseInt(btn.getAttribute("data-id"));
                const produto = produtos.find(p => p.id === produtoId);
                if(produto) abrirModal(produto);
            });
        });
    }

    // Abrir modal com produto selecionado
    function abrirModal(produto) {
        produtoSelecionado = produto;
        quantidadeAtual = 1;
        quantidadeSpan.innerText = quantidadeAtual;
        modalProdutoNome.innerText = produto.nome;
        modalPrecoSpan.innerText = `R$ ${produto.preco.toFixed(2)} cada`;
        
        // Limpar campos do formulário
        clienteTelefone.value = "";
        clienteEndereco.value = "";
        formaPagamento.value = "";
        
        modal.style.display = "flex";
    }

    // Fechar modal
    function fecharModal() {
        modal.style.display = "none";
        produtoSelecionado = null;
    }

    // Incrementar quantidade
    maisBtn.onclick = () => {
        quantidadeAtual++;
        quantidadeSpan.innerText = quantidadeAtual;
    };
    menosBtn.onclick = () => {
        if(quantidadeAtual > 1) {
            quantidadeAtual--;
            quantidadeSpan.innerText = quantidadeAtual;
        }
    };

    // Validar e enviar pedido completo via WhatsApp
    function enviarPedidoWhatsApp() {
        if(!produtoSelecionado) return;
        
        // Validar campos obrigatórios
        const telefone = clienteTelefone.value.trim();
        const endereco = clienteEndereco.value.trim();
        const pagamento = formaPagamento.value;
        
        if(!telefone) {
            alert("⚠️ Por favor, informe seu telefone para contato!");
            clienteTelefone.focus();
            return false;
        }
        if(!endereco) {
            alert("⚠️ Por favor, informe seu endereço completo para entrega!");
            clienteEndereco.focus();
            return false;
        }
        if(!pagamento) {
            alert("⚠️ Por favor, selecione a forma de pagamento!");
            formaPagamento.focus();
            return false;
        }
        
        const nomeProduto = produtoSelecionado.nome;
        const precoUnitario = produtoSelecionado.preco;
        const quantidade = quantidadeAtual;
        const total = (precoUnitario * quantidade).toFixed(2);
        
        // Montar mensagem completa
        const mensagem = `💄 *NOVO PEDIDO - BELEZA STORE* 💄%0A%0A` +
            `👤 *Cliente:* ${telefone}%0A` +
            `🏠 *Endereço:* ${endereco}%0A` +
            `💰 *Pagamento:* ${pagamento}%0A` +
            `%0A📋 *PRODUTO:*%0A` +
            `✨ *Nome:* ${nomeProduto}%0A` +
            `📦 *Quantidade:* ${quantidade}%0A` +
            `💵 *Valor unitário:* R$ ${precoUnitario.toFixed(2)}%0A` +
            `💎 *TOTAL DO PEDIDO:* R$ ${total}%0A%0A` +
            `✅ *Observação:* Cliente aguarda confirmação do pedido.%0A` +
            `⏱️ Pedido enviado via catálogo virtual de beleza.`;
        
        const urlWhats = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensagem}`;
        window.open(urlWhats, "_blank");
        
        return true;
    }

    confirmarBtn.onclick = () => {
        if(produtoSelecionado) {
            if(enviarPedidoWhatsApp()) {
                fecharModal();
            }
        } else {
            fecharModal();
        }
    };
    
    cancelarBtn.onclick = () => {
        fecharModal();
    };
    
    // Fechar modal clicando fora
    window.onclick = (event) => {
        if(event.target === modal) {
            fecharModal();
        }
    };

    // FILTRO POR CATEGORIA
    const botoesCategoria = document.querySelectorAll(".cat-btn");
    botoesCategoria.forEach(btn => {
        btn.addEventListener("click", () => {
            const cat = btn.getAttribute("data-cat");
            botoesCategoria.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            
            if(cat === "all") {
                produtosAtivos = [...produtos];
            } else {
                produtosAtivos = produtos.filter(p => p.categoria === cat);
            }
            renderizarProdutos();
        });
    });
    
    // Inicializar
    renderizarProdutos();
</script>
</body>
</html>
